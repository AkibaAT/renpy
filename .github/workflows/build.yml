    - name: Install dependencies
      run: ./renpy-build/install-deps.sh

    - name: Cache tars (SDKs)
      uses: actions/cache@v4
      with:
        path: renpy-build/tars
        key: tars-${{ runner.os }}-${{ runner.arch }}-v1
        restore-keys: tars-${{ runner.os }}-${{ runner.arch }}-

    - name: Cache tmp (build artifacts)
      uses: actions/cache@v4
      with:
        path: |
          renpy-build/tmp/host
          renpy-build/tmp/cross.*
          renpy-build/tmp/source
          renpy-build/tmp/install.*
        key: tmp-windows-${{ hashFiles('renpy-build/tasks/*.py') }}
        restore-keys: |
