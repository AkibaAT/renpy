        curl -L -o CubismSdkForNative-5-r.4.1.zip https://cubism.live2d.com/sdk-native/bin/CubismSdkForNative-5-r.4.1.zip

    - name: Install 1Password CLI
      uses: 1password/install-cli-action@v1

    - name: Download Mac SDK from 1Password
      run: |
        mkdir -p tars
        op read "op://renpy/MacOSX12.3.sdk.tar/MacOSX12.3.sdk.tar.bz2" > tars/MacOSX12.3.sdk.tar.bz2
        ls -l tars
        md5sum tars/MacOSX12.3.sdk.tar.bz2
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build for ${{ matrix.platform }} ${{ matrix.arch }}
