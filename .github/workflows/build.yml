name: Build Ren'Py Engine

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        platform: [linux]
        arch: [x86_64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download Cubism SDK
      run: |
        mkdir -p tars
        cd tars
        curl -L -o CubismSdkForNative-5-r.4.1.zip https://cubism.live2d.com/sdk-native/bin/CubismSdkForNative-5-r.4.1.zip

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build for ${{ matrix.platform }} ${{ matrix.arch }}
      run: |
        docker compose run --rm builder ./build.py --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: renpy-${{ matrix.platform }}-${{ matrix.arch }}
        path: |
          lib/
          !lib/**/*.pyc
          !lib/**/__pycache__/
        retention-days: 7

  build-windows:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        platform: [windows]
        arch: [x86_64]
    
    steps:
